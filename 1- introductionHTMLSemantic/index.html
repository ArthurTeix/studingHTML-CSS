    <h1>APRENDENDO A USAR AS TAGS SEMANTICAS</h1>
    <br>
    <p>
        <strong>ÊNFASE NA SEMÂNTICA</strong> <br>
        <b>APENAS NEGRITO (estilo)</b> <br>
        <em>ÊNFASE NA SEMÃNTICA</em><br>
